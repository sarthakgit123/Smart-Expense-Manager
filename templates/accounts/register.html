{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
{% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3 class="text-center mb-4">Register</h3>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Username" value="{{ username|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="first_name" class="form-control" placeholder="First Name" value="{{ first_name|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="last_name" class="form-control" placeholder="Last Name" value="{{ last_name|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" value="{{ email|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" name="password1" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">
                        Already have an account? Login
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
