{% extends "base.html" %}
{% block title %}Add Budget{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h3 class="mb-3">Set Monthly Budget</h3>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label>Category</label>
            {{ form.category }}
          </div>

          <div class="mb-3">
            <label>Monthly Limit (₹)</label>
            {{ form.monthly_limit }}
          </div>

          <div class="mb-3">
            <label>Month</label>
            {{ form.month }}
          </div>

          <div class="mb-3">
            <label>Year</label>
            {{ form.year }}
          </div>

          <button type="submit" class="btn btn-primary">
            Save Budget
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
