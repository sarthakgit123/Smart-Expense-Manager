{% extends "base.html" %}

{% block title %}
    {% if object %}Edit Category{% else %}Add Category{% endif %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-4">
                    {% if object %}
                        Edit Category
                    {% else %}
                        Add Category
                    {% endif %}
                </h3>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Category Name</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category Type</label>
                        {{ form.category_type }}
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            Save
                        </button>
                        <a href="{% url 'accounts:dashboard' %}"
                           class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
