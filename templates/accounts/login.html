{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
  .auth-wrap {
    min-height: calc(100vh - 52px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .auth-card {
    background: #1a1d27;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }

  .auth-card-header {
    padding: 28px 32px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }

  .auth-logo {
    font-size: 0.85rem;
    font-weight: 700;
    color: #848aa8;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .auth-logo span { color: #5b8dee; }

  .auth-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #e8eaf2;
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }

  .auth-sub {
    font-size: 0.8rem;
    color: #50566e;
  }

  .auth-card-body {
    padding: 28px 32px 32px;
  }

  /* Google button */
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 10px 18px;
    border-radius: 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8eaf2;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.15s ease;
    margin-bottom: 20px;
  }
  .btn-google:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
    color: #e8eaf2;
  }

  .google-icon {
    width: 17px;
    height: 17px;
    flex-shrink: 0;
  }

  /* Divider */
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }
  .auth-divider span {
    font-size: 0.72rem;
    color: #50566e;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* Inputs */
  .f-group { margin-bottom: 14px; }

  .f-input {
    width: 100%;
    background: #111318 !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 9px !important;
    color: #e8eaf2 !important;
    font-family: 'Inter', sans-serif;
    font-size: 0.87rem;
    padding: 10px 14px !important;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: none !important;
  }
  .f-input::placeholder { color: #50566e; }
  .f-input:focus {
    border-color: #5b8dee !important;
    box-shadow: 0 0 0 3px rgba(91,141,238,0.12) !important;
  }

  /* Submit */
  .btn-submit {
    width: 100%;
    padding: 10px;
    background: #5b8dee;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 6px;
  }
  .btn-submit:hover {
    background: #4a7cde;
    box-shadow: 0 4px 16px rgba(91,141,238,0.35);
  }

  /* Footer link */
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.8rem;
    color: #50566e;
  }
  .auth-footer a {
    color: #5b8dee;
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-card-header">
      <div class="auth-logo">Finance <span>Tracker</span></div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your account</div>
    </div>

    <div class="auth-card-body">

      <!-- Google -->
      <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <div class="auth-divider"><span>or</span></div>

      <!-- Login Form -->
      <form method="post">
        {% csrf_token %}
        <div class="f-group">
          <input type="text" name="username" class="f-input"
                 placeholder="Username" required autocomplete="username">
        </div>
        <div class="f-group">
          <input type="password" name="password" class="f-input"
                 placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="{% url 'accounts:register' %}">Register</a>
      </div>

    </div>
  </div>
</div>

{% endblock %}
