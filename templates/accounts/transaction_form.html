{% extends "base.html" %}

{% block title %}Transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="mb-4">
                    {% if object %}
                        Edit Transaction
                    {% else %}
                        Add Transaction
                    {% endif %}
                </h3>

                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <div class="mt-3">
                        <button type="submit" class="btn btn-success">
                            Save
                        </button>
                        <a href="{% url 'accounts:dashboard' %}"
                           class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
