{% extends 'base.html' %}

{% block title %}Delete Budget{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h4 class="text-danger">Delete Budget</h4>
                <p>
                    Are you sure you want to delete the budget for
                    <strong>{{ object.category.name }}</strong>
                    ({{ object.month }}/{{ object.year }})?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Yes, Delete
                    </button>
                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
